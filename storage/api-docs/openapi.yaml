openapi: 3.0.3
info:
  title: CRM API
  version: 1.0.0
  description: API для управління клієнтами, рахунками, переказами та рахунками-фактурами
servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  # ==================== AUTH ====================
  /api/v1/auth/login:
    post:
      summary: Логін користувача
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Успішний вхід
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      token_type:
                        type: string
                      expires_in:
                        type: integer
        '401':
          description: Невірні облікові дані

  /api/v1/auth/register:
    post:
      summary: Реєстрація користувача
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - password
                - password_confirmation
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                password_confirmation:
                  type: string
      responses:
        '201':
          description: Реєстрація успішна

  /api/v1/auth/me:
    get:
      summary: Отримати дані поточного користувача
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Дані користувача
        '401':
          description: Не авторизований

  /api/v1/auth/logout:
    post:
      summary: Вихід з системи
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успішний вихід

  /api/v1/auth/refresh:
    post:
      summary: Оновлення JWT токена
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Новий токен

  # ==================== TRANSFERS ====================
  /api/v1/transfers:
    get:
      summary: Отримати список переказів
      tags:
        - Transfers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Успішна відповідь
    post:
      summary: Створити переказ
      tags:
        - Transfers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Переказ створено
        '422':
          description: Помилка валідації

  /api/v1/transfers/{id}:
    get:
      summary: Отримати переказ за ID
      tags:
        - Transfers
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Деталі переказу
        '404':
          description: Переказ не знайдено

  # ==================== INVOICES ====================
  /api/v1/invoices:
    get:
      summary: Отримати список рахунків-фактур
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Успішна відповідь
    post:
      summary: Створити новий рахунок-фактуру
      tags:
        - Invoices
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Рахунок створено
        '422':
          description: Помилка валідації

  /api/v1/invoices/{id}:
    get:
      summary: Отримати рахунок-фактуру за ID
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Деталі рахунку
        '404':
          description: Рахунок не знайдено
    patch:
      summary: Оновити статус рахунку-фактури
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [draft, sent, paid, overdue, cancelled]
      responses:
        '200':
          description: Статус оновлено
        '404':
          description: Інвойс не знайдено
        '422':
          description: Помилка валідації

  # ==================== ACCOUNTS ====================
  /api/v1/accounts:
    get:
      summary: Отримати список рахунків
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Успішна відповідь

  /api/v1/accounts/{id}:
    get:
      summary: Отримати рахунок за ID
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Деталі рахунку
        '404':
          description: Рахунок не знайдено

  /api/v1/accounts/{id}/transactions:
    get:
      summary: Отримати історію транзакцій рахунку
      tags:
        - Accounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [all, deposit, withdrawal, transfer]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Історія транзакцій
        '404':
          description: Рахунок не знайдено

  # ==================== CLIENTS ====================
  /api/v1/clients:
    get:
      summary: Отримати список клієнтів
      tags:
        - Clients
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Успішна відповідь

  /api/v1/clients/{id}:
    get:
      summary: Отримати клієнта за ID
      tags:
        - Clients
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Деталі клієнта
        '404':
          description: Клієнт не знайдений

  /api/v1/clients/{id}/accounts:
    get:
      summary: Отримати рахунки клієнта
      tags:
        - Clients
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список рахунків клієнта

  # ==================== SERVICES ====================
  /api/v1/services:
    get:
      summary: Отримати список послуг
      tags:
        - Services
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успішна відповідь

  /api/v1/services/{id}:
    get:
      summary: Отримати послугу за ID
      tags:
        - Services
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Деталі послуги
        '404':
          description: Послуга не знайдена

  # ==================== DASHBOARD ====================
  /api/v1/dashboard-stats:
    get:
      summary: Отримати статистику для дашборду
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Статистика

  # ==================== HEALTH ====================
  /health:
    get:
      summary: Health check
      tags:
        - System
      responses:
        '200':
          description: Система працює

  /test-sentry:
    get:
      summary: Test Sentry integration (only non-production)
      tags:
        - System
      responses:
        '500':
          description: Test error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateTransferRequest:
      type: object
      required:
        - account_from_id
        - account_to_id
        - amount
        - currency
      properties:
        account_from_id:
          type: integer
        account_to_id:
          type: integer
        amount:
          type: number
        currency:
          type: string
          enum: [UAH, USD, EUR]
        description:
          type: string

    CreateInvoiceRequest:
      type: object
      required:
        - client_id
        - items
      properties:
        client_id:
          type: integer
        currency:
          type: string
          enum: [UAH, USD, EUR]
          default: UAH
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - service_id
              - quantity
              - unit_price
            properties:
              service_id:
                type: integer
              quantity:
                type: integer
                minimum: 1
              unit_price:
                type: number

    Transfer:
      type: object
      properties:
        id:
          type: integer
        account_from_id:
          type: integer
        account_to_id:
          type: integer
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        commission:
          type: number
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        invoice_number:
          type: string
        total_amount:
          type: number
        currency:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Account:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        account_number:
          type: string
        balance:
          type: number
        currency:
          type: string
        created_at:
          type: string
          format: date-time

tags:
  - name: Auth
    description: Аутентифікація та реєстрація
  - name: Transfers
    description: Перекази коштів
  - name: Invoices
    description: Рахунки-фактури
  - name: Accounts
    description: Банківські рахунки
  - name: Clients
    description: Клієнти
  - name: Services
    description: Послуги
  - name: Dashboard
    description: Панель управління
  - name: System
    description: Системні ендпоінти
