services:
  app:
    build: .
    container_name: crm_laravel_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    # - elasticsearch
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: crm_db
      DB_USERNAME: crm_user
      DB_PASSWORD: crm_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      QUEUE_CONNECTION: redis
      XDEBUG_MODE: coverage
      XDEBUG_CONFIG: client_host=host.docker.internal
      LOG_CHANNEL: stderr_json
    command: php artisan serve --host=0.0.0.0 --port=8000

  mysql:
    image: mysql:8.0
    container_name: crm_laravel_mysql
    restart: always
    environment:
      MYSQL_DATABASE: crm_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: crm_laravel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  queue:
    build: .
    container_name: crm_laravel_queue
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    # - elasticsearch
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: crm_db
      DB_USERNAME: crm_user
      DB_PASSWORD: crm_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr_json
    command: php artisan queue:work redis --queue=notifications,audit,default,low,reports --sleep=3 --tries=3

